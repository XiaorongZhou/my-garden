# fly.toml app configuration file for My Garden

app = "my-garden"
primary_region = "sjc"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  MY_GARDEN_DB_PATH = "/data/my_garden.db"
  MY_GARDEN_UPLOAD_DIR = "/data/uploads"
  AI_DAILY_LIMIT = "30"
  AI_IDENTITY_DAILY_LIMIT = "10"
  AI_CHECKIN_DAILY_LIMIT = "10"
  AI_CHAT_DAILY_LIMIT = "20"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "my_garden_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
